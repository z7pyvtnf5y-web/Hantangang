<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>한탄강 여행 추천</title>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:500px;
    text-align:center;
}

h1{
    font-size:40px;
}

select, button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    font-size:18px;
}

button{
    background:#00aa66;
    color:white;
}

#result{
    margin-top:30px;
    text-align:left;
    line-height:2;
    background:#222;
    padding:20px;
    border-radius:15px;
}

</style>
</head>

<body>

<div class="container">

<h1>한탄강에 오신 걸 환영합니다</h1>

<select id="start">
<option value="9">오전 9시</option>
<option value="10">오전 10시</option>
<option value="11">오전 11시</option>
<option value="12">오후 12시</option>
<option value="13">오후 1시</option>
<option value="14">오후 2시</option>
<option value="15">오후 3시</option>
<option value="16">오후 4시</option>
<option value="17">오후 5시</option>
<option value="18">오후 6시</option>
</select>

<select id="end">
<option value="12">오후 12시</option>
<option value="13">오후 1시</option>
<option value="14">오후 2시</option>
<option value="15">오후 3시</option>
<option value="16">오후 4시</option>
<option value="17">오후 5시</option>
<option value="18">오후 6시</option>
</select>

<button onclick="makeCourse()">
코스 추천 받기
</button>

<div id="result"></div>

</div>

<script>

function makeCourse(){

    let start = Number(document.getElementById("start").value);
    let end = Number(document.getElementById("end").value);

    let result = "";

    if(start >= end){
        result = "종료 시간이 시작 시간보다 늦어야 합니다.";
    }

    else{

        result += "🕘 " + start + ":00 - 비둘기낭폭포 관람<br><br>";

        if(start <= 10){
            result += "🍜 10:30 - 오가국수에서 아침 겸 식사<br><br>";
        }

        result += "🌉 11:30 - Y자 출렁다리 관람<br><br>";

        if(end >= 13){
            result += "🍲 12:30 - 한탄강매운탕 점심 식사<br><br>";
        }

        result += "🌄 14:00 - 한탄강 하늘다리 이동<br><br>";

        if(end >= 15){
            result += "🚶 15:00 - 한탄강 주상절리길 산책<br><br>";
        }

        if(end >= 17){
            result += "🍖 17:00 - 신라가든 저녁 식사<br><br>";
        }

        result += "✅ " + end + ":00 - 여행 종료";
    }

    document.getElementById("result").innerHTML = result;
}

</script>
